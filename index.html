<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw AI Steward - Design Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#D0BCFF',
            'on-primary': '#381E72',
            'primary-container': '#4F378B',
            'on-primary-container': '#EADDFF',
            surface: '#1C1B1F',
            'on-surface': '#E6E1E5',
            'surface-variant': '#49454F',
            'on-surface-variant': '#CAC4D0',
            outline: '#938F99',
          },
          fontFamily: {
            display: ['Hanken Grotesk', 'sans-serif'],
            body: ['Geist', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Geist', sans-serif; }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(208,188,255,0.15); }
  </style>
</head>
<body class="bg-surface min-h-screen text-on-surface">

  <!-- Header -->
  <header class="pt-16 pb-8 text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary-container mb-6">
      <span class="material-symbols-outlined text-4xl text-on-primary-container">smart_toy</span>
    </div>
    <h1 class="font-display text-4xl font-bold text-primary mb-3">OpenClaw AI Steward</h1>
    <p class="text-on-surface-variant text-lg font-body max-w-md mx-auto">
      Google Stitch 设计稿在线预览 · Material Design 3
    </p>
  </header>

  <!-- Page Cards -->
  <main class="max-w-4xl mx-auto px-6 pb-20">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

      <a href="pages/butler/index.html" class="card-hover block rounded-3xl bg-surface-variant/40 border border-outline/20 overflow-hidden">
        <img src="pages/butler/screenshot.png" alt="Butler" class="w-full aspect-[9/16] object-cover object-top">
        <div class="p-5">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-primary">home</span>
            <h2 class="font-display text-xl font-semibold">AI 管家</h2>
          </div>
          <p class="text-on-surface-variant text-sm">私人助手主页，语音交互与智能推荐</p>
        </div>
      </a>

      <a href="pages/shop/index.html" class="card-hover block rounded-3xl bg-surface-variant/40 border border-outline/20 overflow-hidden">
        <img src="pages/shop/screenshot.png" alt="Shop" class="w-full aspect-[9/16] object-cover object-top">
        <div class="p-5">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-primary">storefront</span>
            <h2 class="font-display text-xl font-semibold">本地生活</h2>
          </div>
          <p class="text-on-surface-variant text-sm">商城页面，生活服务与商品浏览</p>
        </div>
      </a>

      <a href="pages/tools/index.html" class="card-hover block rounded-3xl bg-surface-variant/40 border border-outline/20 overflow-hidden">
        <img src="pages/tools/screenshot.png" alt="Tools" class="w-full aspect-[9/16] object-cover object-top">
        <div class="p-5">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-primary">build</span>
            <h2 class="font-display text-xl font-semibold">智能技能</h2>
          </div>
          <p class="text-on-surface-variant text-sm">工具箱页面，AI 技能与扩展功能</p>
        </div>
      </a>

      <a href="pages/me/index.html" class="card-hover block rounded-3xl bg-surface-variant/40 border border-outline/20 overflow-hidden">
        <img src="pages/me/screenshot.png" alt="Me" class="w-full aspect-[9/16] object-cover object-top">
        <div class="p-5">
          <div class="flex items-center gap-3 mb-2">
            <span class="material-symbols-outlined text-primary">person</span>
            <h2 class="font-display text-xl font-semibold">个人中心</h2>
          </div>
          <p class="text-on-surface-variant text-sm">用户资料、会员与设置管理</p>
        </div>
      </a>

    </div>

    <!-- Design Spec Link -->
    <div class="mt-10 text-center">
      <a href="design/DESIGN.md" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-primary-container text-on-primary-container font-medium hover:opacity-90 transition-opacity">
        <span class="material-symbols-outlined text-xl">palette</span>
        查看设计规范 (DESIGN.md)
      </a>
    </div>
  </main>

</body>
</html>
