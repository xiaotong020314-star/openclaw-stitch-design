<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OpenClaw AI Steward</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geist', sans-serif;
      background: #0E0E11;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ===== Phone Frame ===== */
    .phone-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .phone-title {
      font-family: 'Hanken Grotesk', sans-serif;
      color: #D0BCFF;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phone-title .material-symbols-outlined {
      font-size: 24px;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 50px;
      background: #1C1B1F;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 2px #2A2930,
        0 0 0 4px #1A1A1E,
        0 25px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(208,188,255,0.08);
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    /* Status Bar */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 32px 6px;
      z-index: 90;
      font-size: 14px;
      font-weight: 600;
      color: #E6E1E5;
    }

    .status-bar .time { font-family: 'Hanken Grotesk', sans-serif; }
    .status-bar .icons { display: flex; gap: 6px; align-items: center; }
    .status-bar .icons .material-symbols-outlined { font-size: 17px; }

    /* Page Content Area */
    .page-content {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      bottom: 84px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page-content::-webkit-scrollbar { display: none; }

    .page-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .page-content iframe.active { display: block; }

    /* Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background: rgba(28, 27, 31, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: flex-start;
      justify-content: space-around;
      padding-top: 8px;
      border-top: 1px solid rgba(78, 76, 84, 0.3);
      z-index: 90;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 4px 12px;
      border-radius: 16px;
      transition: all 0.2s ease;
    }

    .tab-item .material-symbols-outlined {
      font-size: 26px;
      color: #938F99;
      transition: color 0.2s, font-variation-settings 0.2s;
    }

    .tab-item span.label {
      font-size: 11px;
      font-weight: 500;
      color: #938F99;
      transition: color 0.2s;
    }

    .tab-item.active .material-symbols-outlined {
      color: #D0BCFF;
      font-variation-settings: 'FILL' 1, 'wght' 500;
    }

    .tab-item.active span.label {
      color: #D0BCFF;
    }

    /* Home Indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: #E6E1E5;
      border-radius: 3px;
      z-index: 100;
    }

    /* ===== Responsive: on mobile, go full-screen ===== */
    @media (max-width: 430px) {
      body { justify-content: flex-start; }

      .phone-title { display: none; }
      .phone-frame {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
      .dynamic-island { display: none; }
      .phone-wrapper { width: 100%; }
    }

    /* ===== Page indicator pills ===== */
    .page-pills {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .page-pills .pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #938F99;
      background: rgba(73, 69, 79, 0.3);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .page-pills .pill.active {
      color: #381E72;
      background: #D0BCFF;
      border-color: #D0BCFF;
    }

    .page-pills .pill:hover:not(.active) {
      background: rgba(73, 69, 79, 0.6);
    }

    /* Loading */
    .loading-overlay {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      bottom: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1C1B1F;
      z-index: 80;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #49454F;
      border-top-color: #D0BCFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="phone-wrapper">
    <div class="phone-title">
      <span class="material-symbols-outlined">smart_toy</span>
      OpenClaw AI Steward
    </div>

    <div class="phone-frame">
      <!-- Dynamic Island -->
      <div class="dynamic-island"></div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time" id="statusTime">19:52</span>
        <div class="icons">
          <span class="material-symbols-outlined">signal_cellular_alt</span>
          <span class="material-symbols-outlined">wifi</span>
          <span class="material-symbols-outlined">battery_5_bar</span>
        </div>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
      </div>

      <!-- Page Content -->
      <div class="page-content">
        <iframe id="page-butler" src="pages/butler/index.html" class="active" onload="hideLoading()"></iframe>
        <iframe id="page-shop" src="pages/shop/index.html" onload="hideLoading()"></iframe>
        <iframe id="page-tools" src="pages/tools/index.html" onload="hideLoading()"></iframe>
        <iframe id="page-me" src="pages/me/index.html" onload="hideLoading()"></iframe>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab-item active" data-page="butler" onclick="switchTab(this)">
          <span class="material-symbols-outlined">home</span>
          <span class="label">管家</span>
        </div>
        <div class="tab-item" data-page="shop" onclick="switchTab(this)">
          <span class="material-symbols-outlined">storefront</span>
          <span class="label">商城</span>
        </div>
        <div class="tab-item" data-page="tools" onclick="switchTab(this)">
          <span class="material-symbols-outlined">build</span>
          <span class="label">技能</span>
        </div>
        <div class="tab-item" data-page="me" onclick="switchTab(this)">
          <span class="material-symbols-outlined">person</span>
          <span class="label">我的</span>
        </div>
      </div>

      <!-- Home Indicator -->
      <div class="home-indicator"></div>
    </div>

    <!-- Desktop Page Pills -->
    <div class="page-pills">
      <div class="pill active" data-page="butler" onclick="switchPill(this)">管家</div>
      <div class="pill" data-page="shop" onclick="switchPill(this)">商城</div>
      <div class="pill" data-page="tools" onclick="switchPill(this)">技能</div>
      <div class="pill" data-page="me" onclick="switchPill(this)">我的</div>
    </div>
  </div>

  <script>
    // Update status bar time
    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('statusTime').textContent = h + ':' + m;
    }
    updateTime();
    setInterval(updateTime, 30000);

    // Tab switching
    function switchTab(el) {
      const page = el.dataset.page;

      // Update tabs
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');

      // Update pills
      document.querySelectorAll('.page-pills .pill').forEach(p => {
        p.classList.toggle('active', p.dataset.page === page);
      });

      // Switch iframe
      document.querySelectorAll('.page-content iframe').forEach(f => f.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
    }

    function switchPill(el) {
      const page = el.dataset.page;

      // Update pills
      document.querySelectorAll('.page-pills .pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');

      // Update tabs
      const tab = document.querySelector('.tab-item[data-page="' + page + '"]');
      if (tab) switchTab(tab);
    }

    // Loading
    let loadedCount = 0;
    function hideLoading() {
      loadedCount++;
      if (loadedCount >= 4) {
        document.getElementById('loadingOverlay').classList.add('hidden');
      }
    }

    // Fallback: hide loading after 3s regardless
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }, 3000);
  </script>

</body>
</html>
